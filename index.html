<style>
:root{
  --bg:#050607;--panel:#101418;--panel2:#171d22;--line:#2b343b;--gold:#ffc400;
  --white:#f6f7f8;--muted:#9ba6ad;--green:#20c65a;--blue:#2377ff;--yellow:#ffbf00;--red:#ff3b3b;--purple:#9b35e8;
}
*{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 50% 0%,#182832 0%,#080b0d 42%,#020303 100%);color:var(--white);font-family:Oswald,Arial,sans-serif;overflow:hidden;text-transform:uppercase}.screen{height:100vh;padding:18px;display:flex;flex-direction:column;gap:14px}.top{height:124px;border-radius:18px;background:linear-gradient(180deg,#171c20,#0b0e10);border:1px solid #263039;display:grid;grid-template-columns:340px 1fr 445px;align-items:center;box-shadow:0 0 40px rgba(0,0,0,.45)}.brand{display:flex;align-items:center;padding-left:24px;height:100%;overflow:hidden}.logoKmf{width:285px;max-height:92px;object-fit:contain;display:block;filter:brightness(1.08) contrast(1.12) drop-shadow(0 0 8px rgba(0,120,255,.55)) drop-shadow(0 0 18px rgba(255,196,0,.12));transition:.35s ease}.logoKmf:hover{filter:brightness(1.18) contrast(1.18) drop-shadow(0 0 14px rgba(0,120,255,.75)) drop-shadow(0 0 24px rgba(255,196,0,.18))}.titleBox{border-left:1px solid #27313a;padding-left:32px}.plane{display:inline-grid;place-items:center;width:76px;height:68px;background:var(--gold);color:#111;border-radius:14px;margin-right:26px;font-size:42px;vertical-align:middle}.title{font-size:50px;letter-spacing:13px;font-weight:700;line-height:1}.sub{font-family:'Roboto Mono',monospace;color:var(--gold);letter-spacing:7px;font-size:15px;margin-top:11px}.timeArea{height:100%;display:grid;grid-template-columns:1fr 1fr}.timeBox{display:flex;align-items:center;justify-content:center;gap:14px;border-left:1px solid #27313a}.ico{color:var(--gold);font-size:36px}.lbl{color:var(--gold);font-size:16px;letter-spacing:2px}.val{font-family:'Roboto Mono',monospace;font-size:30px;font-weight:700}.board{flex:1;border-radius:18px;border:1px solid #263039;background:rgba(10,13,15,.96);overflow:hidden;box-shadow:0 0 36px rgba(0,0,0,.45);display:flex;flex-direction:column}.head,.row{display:grid;grid-template-columns:1.55fr .95fr .82fr 1fr .72fr .88fr 1.18fr 1.05fr;align-items:center}.head{height:64px;background:linear-gradient(180deg,#1b242a,#11171b);border-bottom:2px solid var(--gold);color:var(--gold);font-size:18px;letter-spacing:1px}.head div{padding:0 16px;border-right:1px solid #2b343b}.rows{flex:1;overflow:hidden}.row{height:58px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#171b1e,#111416);font-family:'Roboto Mono',monospace;font-size:21px;letter-spacing:1.4px;animation:fade .35s ease}.row:nth-child(even){background:linear-gradient(180deg,#1a1f23,#13171a)}.row:hover{filter:brightness(1.2)}.cell{padding:0 16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.center{text-align:center}.badge{display:inline-flex;align-items:center;justify-content:center;min-width:112px;height:32px;border-radius:5px;padding:0 12px;font-family:Oswald,sans-serif;font-size:19px;font-weight:700;letter-spacing:1.5px;box-shadow:inset 0 -8px 14px rgba(0,0,0,.23)}.verde{background:var(--green);color:#fff}.amarelo{background:var(--yellow);color:#111}.azul{background:var(--blue);color:#fff}.vermelho{background:var(--red);color:#fff}.roxo{background:var(--purple);color:#fff}.status{min-width:140px}.ok{background:var(--green)}.warn{background:var(--yellow);color:#111}.bad{background:var(--red)}.orange{background:#f97316;color:#111}.done{background:var(--blue)}.gray{background:#68727a;color:#fff}.footer{height:64px;border-radius:18px;background:linear-gradient(180deg,#151b20,#0c1013);border:1px solid #263039;display:grid;grid-template-columns:330px 1fr 455px;align-items:center;padding:0 26px;color:var(--gold);font-size:18px;letter-spacing:2px}.total strong{font-family:'Roboto Mono',monospace;color:#fff;font-size:31px;margin-left:12px}.legend{display:flex;align-items:center;justify-content:center;gap:19px}.mini{display:inline-block;width:29px;height:18px;border-radius:3px;margin-right:7px;vertical-align:middle}.sync{text-align:right;color:#fff;font-family:'Roboto Mono',monospace;font-size:17px}.sync span{color:var(--gold);font-family:Oswald,sans-serif;margin-right:8px}.loading{position:absolute;right:24px;bottom:96px;color:var(--gold);font-family:'Roboto Mono',monospace;font-size:13px;opacity:0}.loading.on{opacity:1}@keyframes fade{from{opacity:.4;transform:translateY(5px)}to{opacity:1;transform:none}}@media(max-width:1300px){.top{grid-template-columns:260px 1fr 330px}.logoKmf{width:230px}.title{font-size:36px;letter-spacing:7px}.brand strong{font-size:42px}.row{font-size:16px}.head{font-size:14px}.badge{min-width:90px;font-size:15px}.plane{display:none}}


/* =========================================================
   VERSÃO RESPONSIVA V2 - MAIS LINHAS E MELHOR APROVEITAMENTO
   ========================================================= */
html, body{width:100%;min-height:100%;}
body{overflow:hidden;}
.screen{
  height:100svh;
  padding:clamp(6px, .8vw, 14px);
  gap:clamp(6px, .65vw, 12px);
}
.top{
  height:clamp(78px, 10.5vh, 118px);
  border-radius:clamp(10px, 1vw, 18px);
  grid-template-columns:minmax(190px, 16vw) 1fr minmax(300px, 24vw);
}
.brand{padding-left:clamp(10px, 1.2vw, 22px);}
.logoKmf{width:clamp(170px, 14vw, 270px);max-height:clamp(58px, 8vh, 88px);}
.titleBox{padding-left:clamp(12px, 1.6vw, 30px);}
.plane{width:clamp(42px, 4vw, 70px);height:clamp(38px, 4vw, 62px);font-size:clamp(25px, 2.6vw, 40px);margin-right:clamp(10px, 1.2vw, 22px);}
.title{font-size:clamp(28px, 3.2vw, 48px);letter-spacing:clamp(3px, .62vw, 12px);}
.sub{font-size:clamp(10px, .86vw, 14px);letter-spacing:clamp(2px, .42vw, 6px);margin-top:clamp(5px, .6vh, 10px);}
.timeBox{gap:clamp(7px, .8vw, 14px);}
.ico{font-size:clamp(22px, 2vw, 34px);}
.lbl{font-size:clamp(11px, .9vw, 15px);letter-spacing:1.4px;}
.val{font-size:clamp(18px, 1.75vw, 28px);}
.board{border-radius:clamp(10px, 1vw, 18px);min-height:0;}
.head,.row{
  grid-template-columns:1.55fr .86fr .72fr .86fr .55fr .68fr .9fr .98fr;
}
.head{
  height:clamp(34px, 4.4vh, 52px);
  font-size:clamp(11px, .82vw, 16px);
  letter-spacing:.55px;
}
.head div{padding:0 clamp(5px, .7vw, 12px);}
.rows{flex:1;overflow:auto;scrollbar-width:thin;}
.row{
  height:clamp(31px, 4.25vh, 44px);
  min-height:31px;
  font-size:clamp(11px, .95vw, 17px);
  letter-spacing:clamp(.15px, .08vw, 1px);
}
.cell{padding:0 clamp(5px, .72vw, 12px);}
.badge{
  min-width:clamp(64px, 6.4vw, 100px);
  height:clamp(20px, 2.5vh, 28px);
  padding:0 clamp(6px, .55vw, 10px);
  font-size:clamp(10px, .86vw, 16px);
  letter-spacing:.65px;
}
.status{min-width:clamp(80px, 7.5vw, 125px);}
.footer{
  height:clamp(40px, 5.5vh, 58px);
  border-radius:clamp(10px, 1vw, 18px);
  grid-template-columns:minmax(210px, 20vw) 1fr minmax(290px, 28vw);
  padding:0 clamp(10px, 1.3vw, 24px);
  font-size:clamp(11px, .9vw, 16px);
  letter-spacing:clamp(.4px, .12vw, 1.6px);
}
.total strong{font-size:clamp(18px, 1.8vw, 28px);margin-left:clamp(5px, .6vw, 10px);}
.legend{gap:clamp(7px, 1vw, 17px);}
.mini{width:clamp(16px, 1.45vw, 26px);height:clamp(10px, .95vw, 16px);margin-right:5px;}
.sync{font-size:clamp(10px, .82vw, 15px);}
.loading{right:clamp(10px, 1vw, 22px);bottom:clamp(58px, 7vh, 88px);}

@media (min-width: 1800px){
  .row{height:38px;font-size:16px;}
  .head{height:44px;font-size:15px;}
  .screen{padding:10px;gap:8px;}
  .top{height:96px;}
  .footer{height:48px;}
}

@media (max-width: 1100px){
  body{overflow:auto;}
  .screen{min-height:100svh;height:auto;}
  .top{height:auto;min-height:76px;grid-template-columns:160px 1fr;grid-template-areas:'brand title' 'time time';}
  .brand{grid-area:brand;}
  .titleBox{grid-area:title;}
  .timeArea{grid-area:time;height:44px;border-top:1px solid #27313a;grid-template-columns:1fr 1fr;}
  .logoKmf{width:150px;}
  .plane{display:none;}
  .title{font-size:26px;letter-spacing:3px;}
  .sub{font-size:10px;letter-spacing:2px;}
  .board{height:auto;min-height:62vh;}
  .head,.row{grid-template-columns:1.55fr .8fr .75fr .8fr .55fr .6fr .86fr .9fr;}
  .head{height:34px;font-size:10px;}
  .row{height:34px;font-size:11px;}
  .footer{height:auto;min-height:44px;grid-template-columns:1fr;gap:5px;padding:8px 10px;text-align:center;}
  .sync{text-align:center;}
  .legend{flex-wrap:wrap;}
}

@media (max-width: 720px){
  .screen{padding:6px;gap:6px;}
  .top{grid-template-columns:1fr;grid-template-areas:'brand' 'title' 'time';text-align:center;}
  .brand{justify-content:center;padding:8px 0 0;}
  .titleBox{border-left:0;padding:0 8px 6px;}
  .timeArea{height:40px;}
  .head,.row{min-width:920px;}
  .rows{overflow:auto;}
  .board{overflow:auto;}
  .footer{font-size:11px;}
}

</style>
